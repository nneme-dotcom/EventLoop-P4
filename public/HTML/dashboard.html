<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EventLoop P4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/estilos.css">
    <style>
        .drop-zone {
            min-height: 400px;
            border: 2px dashed #0d6efd;
            border-radius: 15px;
            background-color: #f8f9fa;
            transition: all 0.3s ease;
        }
        .drop-zone.drag-over {
            background-color: #e7f1ff;
            border-color: #0a58ca;
        }
        .card-empleo {
            cursor: grab;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }
        .card-empleo:hover { transform: translateX(4px); }
        .card-empleo:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold">EventLoop</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="empleos.html">Voluntariados</a></li>
                    <li class="nav-item"><a class="nav-link" href="usuarios.html">Usuarios</a></li>
                </ul>
                <span class="navbar-text text-info me-3" id="usuarioActivo">-no login-</span>
                <button class="btn btn-outline-light btn-sm" id="btnLogout">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="text-center mb-4">
            <h1>Dashboard de Voluntariados</h1>
        </header>

        <!-- Filtros de visualización -->
        <div class="row mb-3">
            <div class="col-md-4 offset-md-4">
                <div class="input-group">
                    <label class="input-group-text" for="filtroTipo">🔍 Filtrar</label>
                    <select class="form-select" id="filtroTipo">
                        <option value="Todos">Todos</option>
                        <option value="Oferta">Solo Ofertas</option>
                        <option value="Demanda">Solo Demandas</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="p-3 bg-white shadow-sm rounded">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0">📋 Voluntariados Disponibles</h5>
                        <small class="text-muted">← Arrastra aquí para devolver</small>
                    </div>
                    <hr>
                    <div id="tarjetas" class="drop-zone p-2">
                        <p class="text-center text-muted py-5">Cargando...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="p-3 bg-white shadow-sm rounded">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0">⭐ Mi Selección Personal</h5>
                        <small class="text-muted">← Arrastra aquí para seleccionar</small>
                    </div>
                    <hr>
                    <div id="seleccionados" class="drop-zone d-flex flex-column p-2">
                        <p class="text-center text-muted my-auto">
                            Arrastra aquí los voluntariados que te interesen
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast de notificación en tiempo real (WebSocket) -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="toastNotificacion" class="toast align-items-center text-bg-primary border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastBody">Notificación</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Socket.io client (servido por el propio servidor Express) -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../JS/int_1_dashboard.js"></script>
</body>
</html>
