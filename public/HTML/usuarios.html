<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - EventLoop P4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/estilos.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold">EventLoop</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="empleos.html">Voluntariados</a></li>
                    <li class="nav-item"><a class="nav-link active" href="usuarios.html">Usuarios</a></li>
                </ul>
                <span class="navbar-text text-info me-3" id="usuarioActivo">-no login-</span>
                <button class="btn btn-outline-light btn-sm" id="btnLogout">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Alerta de acceso denegado (para usuarios normales) -->
        <div id="alertAcceso" class="alert alert-danger d-none" role="alert"></div>

        <div class="row">
            <!-- Formulario de alta -->
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h4 class="card-title">Nuevo Usuario</h4>
                        <hr>
                        <form id="formUsuario">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" id="nombre" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" required minlength="6">
                            </div>
                            <!-- Selector de rol: solo visible/usable para admins -->
                            <div class="mb-3">
                                <label for="rolUsuario" class="form-label">Rol</label>
                                <select class="form-select" id="rolUsuario">
                                    <option value="usuario" selected>Usuario</option>
                                    <option value="admin">Administrador</option>
                                </select>
                                <div class="form-text text-muted">Solo los administradores pueden crear otros admins.</div>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Dar de Alta</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Tabla de usuarios -->
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title">Usuarios en el Sistema</h4>
                        <hr>
                        <table class="table table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>Nombre</th>
                                    <th>Email</th>
                                    <th>Rol</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaUsuarios"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../JS/int_4_usuarios.js"></script>
</body>
</html>
